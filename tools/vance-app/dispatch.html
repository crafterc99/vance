<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VANCE — Dispatch Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a14;
  --bg-card: #12121e;
  --bg-card-hover: #1a1a2e;
  --border: #1e1e35;
  --text: #e0e0f0;
  --text-dim: #7070a0;
  --text-muted: #4a4a6a;
  --accent: #4488ff;
  --green: #00e5a0;
  --warn: #ffa040;
  --danger: #ff3355;
  --purple: #a855f7;
  --mono: 'JetBrains Mono', monospace;
  --sans: 'Inter', sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:13px; overflow-x:hidden; }

/* ─── Top Bar ─── */
.topbar {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 20px; border-bottom:1px solid var(--border);
  background:rgba(10,10,20,0.9); backdrop-filter:blur(12px);
  position:sticky; top:0; z-index:100;
}
.topbar-left { display:flex; align-items:center; gap:16px; }
.logo { font-family:var(--mono); font-weight:700; font-size:14px; color:var(--accent); letter-spacing:2px; }
.status-pill { display:flex; align-items:center; gap:6px; font-size:10px; color:var(--text-dim); }
.status-dot { width:6px; height:6px; border-radius:50%; background:#555; }
.status-dot.online { background:var(--green); box-shadow:0 0 6px var(--green); }
.nav-btn {
  font-family:var(--mono); font-size:10px; letter-spacing:1px;
  padding:5px 12px; border:1px solid var(--border); border-radius:4px;
  background:transparent; color:var(--text-dim); cursor:pointer; text-decoration:none;
}
.nav-btn:hover { border-color:var(--accent); color:var(--text); }
.nav-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(68,136,255,0.08); }
.topbar-right { display:flex; gap:8px; }

/* ─── Main Layout ─── */
.main { display:grid; grid-template-columns:280px 1fr 320px; gap:0; height:calc(100vh - 45px); }
.col { padding:16px; overflow-y:auto; border-right:1px solid var(--border); }
.col:last-child { border-right:none; }
.col-label { font-family:var(--mono); font-size:9px; letter-spacing:2px; color:var(--text-muted); text-transform:uppercase; margin-bottom:10px; }

/* ─── Projects Column ─── */
.project-card {
  background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
  padding:12px; margin-bottom:8px; cursor:pointer; transition:all 0.2s;
  position:relative;
}
.project-card:hover { border-color:var(--accent); background:var(--bg-card-hover); }
.project-card.active { border-color:var(--accent); box-shadow:0 0 12px rgba(68,136,255,0.15); }
.project-dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:8px; }
.project-name { font-weight:600; font-size:13px; display:flex; align-items:center; }
.project-desc { font-size:10px; color:var(--text-dim); margin-top:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.project-badges { display:flex; gap:4px; margin-top:6px; flex-wrap:wrap; }
.badge {
  font-family:var(--mono); font-size:8px; letter-spacing:0.5px; padding:2px 6px;
  border-radius:3px; border:1px solid var(--border); color:var(--text-dim);
}
.badge.framework { border-color:var(--accent); color:var(--accent); }
.badge.running { border-color:var(--green); color:var(--green); animation:pulse 2s infinite; }
.badge.claudemd { border-color:var(--purple); color:var(--purple); }
.bootstrap-btn {
  font-family:var(--mono); font-size:9px; padding:4px 10px; border:1px solid var(--border);
  border-radius:4px; background:transparent; color:var(--text-dim); cursor:pointer;
  margin-top:8px; transition:all 0.2s;
}
.bootstrap-btn:hover { border-color:var(--purple); color:var(--purple); }
.bootstrap-all-btn {
  width:100%; padding:8px; margin-top:12px; font-family:var(--mono); font-size:10px;
  letter-spacing:1px; border:1px dashed var(--border); border-radius:6px;
  background:transparent; color:var(--text-muted); cursor:pointer;
}
.bootstrap-all-btn:hover { border-color:var(--purple); color:var(--purple); }

/* ─── Dispatch Center Column ─── */
.dispatch-form {
  background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
  padding:16px; margin-bottom:16px;
}
.dispatch-form h3 { font-family:var(--mono); font-size:11px; letter-spacing:1px; color:var(--accent); margin-bottom:12px; }
.form-row { margin-bottom:10px; }
.form-row label { display:block; font-size:10px; color:var(--text-dim); margin-bottom:4px; font-family:var(--mono); }
.form-row textarea, .form-row select, .form-row input {
  width:100%; padding:8px 10px; background:var(--bg); border:1px solid var(--border);
  border-radius:4px; color:var(--text); font-family:var(--sans); font-size:12px;
  resize:vertical;
}
.form-row textarea:focus, .form-row select:focus, .form-row input:focus {
  outline:none; border-color:var(--accent);
}
.form-actions { display:flex; gap:8px; }
.btn {
  font-family:var(--mono); font-size:10px; letter-spacing:0.5px; padding:8px 16px;
  border:1px solid var(--border); border-radius:4px; background:transparent;
  color:var(--text); cursor:pointer; transition:all 0.2s;
}
.btn:hover { border-color:var(--accent); }
.btn.primary { background:var(--accent); border-color:var(--accent); color:#000; font-weight:600; }
.btn.primary:hover { background:#5599ff; }
.btn.danger { border-color:var(--danger); color:var(--danger); }
.btn.danger:hover { background:rgba(255,51,85,0.1); }

/* ─── Running Tasks ─── */
.running-section { margin-bottom:16px; }
.task-slot {
  background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
  padding:12px; margin-bottom:8px; position:relative;
}
.task-slot.running { border-left:3px solid var(--green); }
.task-slot.queued { border-left:3px solid var(--warn); }
.task-slot.completed { border-left:3px solid var(--text-muted); opacity:0.7; }
.task-slot.failed { border-left:3px solid var(--danger); }
.task-header { display:flex; justify-content:space-between; align-items:center; }
.task-title { font-weight:600; font-size:12px; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.task-status {
  font-family:var(--mono); font-size:8px; letter-spacing:1px; padding:2px 6px;
  border-radius:3px; text-transform:uppercase;
}
.task-status.running { background:rgba(0,229,160,0.15); color:var(--green); }
.task-status.queued { background:rgba(255,160,64,0.15); color:var(--warn); }
.task-status.completed { background:rgba(112,112,160,0.15); color:var(--text-dim); }
.task-status.failed { background:rgba(255,51,85,0.15); color:var(--danger); }
.task-meta { display:flex; gap:12px; margin-top:6px; font-size:10px; color:var(--text-dim); font-family:var(--mono); }
.task-milestones { margin-top:6px; }
.milestone-tag {
  display:inline-block; font-family:var(--mono); font-size:8px; padding:1px 5px;
  border:1px solid var(--green); color:var(--green); border-radius:2px; margin:2px 2px 0 0;
}
.task-controls { display:flex; gap:4px; margin-top:8px; }
.task-controls .btn { padding:4px 8px; font-size:8px; }
.task-log-preview {
  margin-top:8px; padding:8px; background:var(--bg); border-radius:4px;
  font-family:var(--mono); font-size:9px; color:var(--text-dim);
  max-height:100px; overflow-y:auto; white-space:pre-wrap; word-break:break-all;
}

/* ─── Activity Feed ─── */
.feed-item {
  padding:8px 0; border-bottom:1px solid rgba(30,30,53,0.5);
  font-size:11px; display:flex; gap:8px; align-items:flex-start;
}
.feed-time { font-family:var(--mono); font-size:9px; color:var(--text-muted); min-width:50px; }
.feed-type {
  font-family:var(--mono); font-size:8px; letter-spacing:0.5px; padding:1px 4px;
  border-radius:2px; min-width:60px; text-align:center;
}
.feed-type.dispatch { background:rgba(68,136,255,0.15); color:var(--accent); }
.feed-type.task { background:rgba(0,229,160,0.15); color:var(--green); }
.feed-type.bootstrap { background:rgba(168,85,247,0.15); color:var(--purple); }
.feed-type.error { background:rgba(255,51,85,0.15); color:var(--danger); }
.feed-type.milestone { background:rgba(255,160,64,0.15); color:var(--warn); }
.feed-text { flex:1; color:var(--text-dim); }

/* ─── Concurrency Gauge ─── */
.concurrency-bar {
  display:flex; gap:6px; margin-bottom:16px; padding:10px;
  background:var(--bg-card); border:1px solid var(--border); border-radius:8px;
}
.slot-indicator {
  flex:1; height:24px; border-radius:4px; background:var(--bg);
  border:1px solid var(--border); display:flex; align-items:center;
  justify-content:center; font-family:var(--mono); font-size:8px; color:var(--text-muted);
  transition:all 0.3s;
}
.slot-indicator.active {
  background:rgba(0,229,160,0.15); border-color:var(--green); color:var(--green);
  box-shadow:0 0 8px rgba(0,229,160,0.2);
}
.slot-indicator.active .slot-project { font-weight:600; }

@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
@keyframes slideIn { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
.feed-item { animation: slideIn 0.2s ease; }
</style>
</head>
<body>

<!-- Top Bar -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">VANCE <span style="color:var(--text-muted);font-size:10px">DISPATCH</span></div>
    <div class="status-pill">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting</span>
    </div>
  </div>
  <div class="topbar-right">
    <a class="nav-btn" href="/">Command Center</a>
    <a class="nav-btn" href="/costs">Costs</a>
    <a class="nav-btn" href="/brain">Brain</a>
    <a class="nav-btn" href="/spatial">Spatial</a>
    <a class="nav-btn active" href="/dispatch">Dispatch</a>
  </div>
</div>

<!-- Main Layout -->
<div class="main">

  <!-- Left: Projects -->
  <div class="col" style="border-right:1px solid var(--border)">
    <div class="col-label">Projects</div>
    <div id="projectList"></div>
    <button class="bootstrap-all-btn" id="bootstrapAllBtn">BOOTSTRAP ALL PROJECTS</button>
  </div>

  <!-- Center: Dispatch + Running Tasks -->
  <div class="col">
    <!-- Concurrency Gauge -->
    <div class="col-label">Concurrency Slots</div>
    <div class="concurrency-bar" id="concurrencyBar">
      <div class="slot-indicator" id="slot0"><span class="slot-project">EMPTY</span></div>
      <div class="slot-indicator" id="slot1"><span class="slot-project">EMPTY</span></div>
      <div class="slot-indicator" id="slot2"><span class="slot-project">EMPTY</span></div>
    </div>

    <!-- Dispatch Form -->
    <div class="dispatch-form">
      <h3>DISPATCH TASK</h3>
      <div class="form-row">
        <label>Project</label>
        <select id="dispatchProject"><option value="">General</option></select>
      </div>
      <div class="form-row">
        <label>Task Description</label>
        <textarea id="dispatchTask" rows="3" placeholder="Describe what Claude Code should do..."></textarea>
      </div>
      <div class="form-row" style="display:flex;gap:8px">
        <div style="flex:1">
          <label>Mode</label>
          <select id="dispatchMode">
            <option value="background">Background</option>
            <option value="interactive">Interactive</option>
          </select>
        </div>
        <div style="flex:1">
          <label>Model</label>
          <select id="dispatchModel">
            <option value="">Auto-detect</option>
            <option value="claude-haiku-4-5">Haiku</option>
            <option value="claude-sonnet-4-6">Sonnet</option>
            <option value="claude-opus-4-6">Opus</option>
          </select>
        </div>
        <div style="flex:1">
          <label>Budget ($)</label>
          <input id="dispatchBudget" type="number" step="0.5" placeholder="Auto" />
        </div>
      </div>
      <div class="form-actions">
        <button class="btn primary" id="dispatchBtn">DISPATCH</button>
      </div>
    </div>

    <!-- Running & Recent Tasks -->
    <div class="col-label">Tasks</div>
    <div class="running-section" id="taskList"></div>
  </div>

  <!-- Right: Activity Feed -->
  <div class="col">
    <div class="col-label">Activity Feed</div>
    <div id="activityFeed"></div>
  </div>

</div>

<script>
(function() {
  'use strict';

  // ─── State ───
  const state = { ws: null, projects: [], tasks: [], feed: [], selectedProject: null };
  const PROJECT_COLORS = {
    'vantheah': '#4488ff', 'promotifyy': '#ff8c00', 'soul-jam': '#00e5a0',
    'athletes-blender': '#ffc940', 'sos-train': '#ff3355', 'vance': '#a855f7',
  };

  function getColor(id) { return PROJECT_COLORS[id] || '#7070a0'; }
  function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  function timeStr() { return new Date().toLocaleTimeString('en-US', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' }); }

  // ─── Activity Feed ───
  function addFeedItem(type, text) {
    state.feed.unshift({ type, text, time: timeStr() });
    if (state.feed.length > 100) state.feed.pop();
    renderFeed();
  }

  function renderFeed() {
    const el = document.getElementById('activityFeed');
    el.innerHTML = state.feed.slice(0, 50).map(f => `
      <div class="feed-item">
        <span class="feed-time">${f.time}</span>
        <span class="feed-type ${f.type}">${f.type.toUpperCase()}</span>
        <span class="feed-text">${esc(f.text)}</span>
      </div>
    `).join('');
  }

  // ─── Projects ───
  function renderProjects() {
    const el = document.getElementById('projectList');
    const select = document.getElementById('dispatchProject');

    el.innerHTML = state.projects.map(p => {
      const color = getColor(p.id);
      const fw = p.state?.dev_framework || '';
      const running = state.tasks.some(t => t.projectId === p.id && t.status === 'running');
      const hasClaudeMd = p.hasClaudeMd || false;
      return `
        <div class="project-card ${state.selectedProject === p.id ? 'active' : ''}" data-id="${p.id}">
          <div class="project-name">
            <span class="project-dot" style="background:${color}"></span>
            ${esc(p.name)}
          </div>
          <div class="project-desc">${esc(p.description || '')}</div>
          <div class="project-badges">
            ${fw ? `<span class="badge framework">${fw}</span>` : ''}
            ${running ? '<span class="badge running">RUNNING</span>' : ''}
            ${hasClaudeMd ? '<span class="badge claudemd">CLAUDE.MD</span>' : ''}
          </div>
          <button class="bootstrap-btn" onclick="event.stopPropagation(); bootstrapProject('${p.id}')">Bootstrap</button>
        </div>
      `;
    }).join('');

    // Click handler
    el.querySelectorAll('.project-card').forEach(card => {
      card.addEventListener('click', () => {
        state.selectedProject = card.dataset.id;
        document.getElementById('dispatchProject').value = card.dataset.id;
        renderProjects();
      });
    });

    // Update select
    select.innerHTML = '<option value="">General</option>' +
      state.projects.map(p => `<option value="${p.id}">${esc(p.name)}</option>`).join('');
    if (state.selectedProject) select.value = state.selectedProject;
  }

  // ─── Tasks ───
  function renderTasks() {
    const el = document.getElementById('taskList');
    const sorted = [...state.tasks].sort((a, b) => {
      const order = { running: 0, queued: 1, paused: 2, failed: 3, completed: 4, cancelled: 5 };
      return (order[a.status] || 9) - (order[b.status] || 9);
    });

    el.innerHTML = sorted.slice(0, 20).map(t => `
      <div class="task-slot ${t.status}">
        <div class="task-header">
          <span class="task-title">${esc(t.title)}</span>
          <span class="task-status ${t.status}">${t.status}</span>
        </div>
        <div class="task-meta">
          <span>${t.projectId || 'general'}</span>
          <span>${t.tier || ''}/${t.model?.split('-').pop() || ''}</span>
          <span>$${(t.costUsd || 0).toFixed(2)}/$${t.maxBudget || '?'}</span>
          <span>${t.durationFormatted || ''}</span>
        </div>
        ${t.milestones?.length ? `
          <div class="task-milestones">
            ${t.milestones.slice(-5).map(m => `<span class="milestone-tag">${esc(m.detail)}</span>`).join('')}
          </div>
        ` : ''}
        ${t.status === 'running' || t.status === 'queued' ? `
          <div class="task-controls">
            ${t.status === 'running' ? '<button class="btn" onclick="controlTask(\'' + t.id + '\',\'pause\')">Pause</button>' : ''}
            ${t.status === 'queued' ? '' : ''}
            <button class="btn danger" onclick="controlTask('${t.id}','cancel')">Cancel</button>
          </div>
        ` : ''}
        ${t.status === 'paused' || t.status === 'failed' ? `
          <div class="task-controls">
            <button class="btn" onclick="controlTask('${t.id}','resume')">Resume</button>
            <button class="btn danger" onclick="controlTask('${t.id}','cancel')">Cancel</button>
          </div>
        ` : ''}
      </div>
    `).join('') || '<div style="color:var(--text-muted);text-align:center;padding:20px;font-size:11px">No tasks yet. Dispatch one above.</div>';

    // Update concurrency gauge
    const running = state.tasks.filter(t => t.status === 'running');
    for (let i = 0; i < 3; i++) {
      const slot = document.getElementById('slot' + i);
      if (running[i]) {
        slot.className = 'slot-indicator active';
        slot.innerHTML = `<span class="slot-project">${esc(running[i].projectId || running[i].title?.slice(0,10))}</span>`;
      } else {
        slot.className = 'slot-indicator';
        slot.innerHTML = '<span class="slot-project">EMPTY</span>';
      }
    }
  }

  // ─── WebSocket ───
  function connect() {
    const ws = new WebSocket(`ws://${location.host}/ws`);
    state.ws = ws;

    ws.onopen = () => {
      document.getElementById('statusDot').className = 'status-dot online';
      document.getElementById('statusText').textContent = 'ONLINE';
      addFeedItem('task', 'Connected to VANCE');
      ws.send(JSON.stringify({ action: 'list-projects' }));
      ws.send(JSON.stringify({ action: 'get-tasks' }));
    };

    ws.onclose = () => {
      document.getElementById('statusDot').className = 'status-dot';
      document.getElementById('statusText').textContent = 'OFFLINE';
      setTimeout(connect, 3000);
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleMessage(msg);
      } catch {}
    };
  }

  function send(data) {
    if (state.ws?.readyState === WebSocket.OPEN) {
      state.ws.send(JSON.stringify(data));
    }
  }

  function handleMessage(msg) {
    switch (msg.type) {
      case 'projects': {
        state.projects = msg.projects || [];
        // Check which have CLAUDE.md
        state.projects.forEach(p => {
          try {
            // We'll mark this from state info if available
            p.hasClaudeMd = p.state?.dev_framework ? true : false;
          } catch {}
        });
        renderProjects();
        break;
      }
      case 'tasks': {
        state.tasks = msg.tasks || [];
        renderTasks();
        break;
      }
      case 'dispatch-result': {
        addFeedItem('dispatch', `Dispatched: ${msg.taskId || msg.sessionId || 'ok'} (${msg.mode}) ${msg.status}`);
        send({ action: 'get-tasks' });
        break;
      }
      case 'dispatch-batch-result': {
        addFeedItem('dispatch', `Batch dispatched: ${msg.results?.length || 0} tasks`);
        send({ action: 'get-tasks' });
        break;
      }
      case 'bootstrap-result': {
        const status = msg.success ? 'OK' : 'FAILED';
        addFeedItem('bootstrap', `${msg.projectId}: ${status}${msg.error ? ' — ' + msg.error : ''}`);
        send({ action: 'list-projects' });
        break;
      }
      case 'bootstrap-all-result': {
        const ok = (msg.results || []).filter(r => r.success).length;
        addFeedItem('bootstrap', `Bootstrapped ${ok}/${(msg.results || []).length} projects`);
        send({ action: 'list-projects' });
        break;
      }
      // Task lifecycle events
      case 'task-queued':
      case 'task-started':
        addFeedItem('task', `${msg.type.replace('task-','')} — ${msg.task?.title || msg.taskId || ''}`);
        send({ action: 'get-tasks' });
        break;
      case 'task-completed':
        addFeedItem('task', `completed — ${msg.task?.title || ''} ($${(msg.costUsd||0).toFixed(2)})`);
        send({ action: 'get-tasks' });
        break;
      case 'task-failed':
        addFeedItem('error', `failed — ${msg.task?.title || ''}: ${msg.error || ''}`);
        send({ action: 'get-tasks' });
        break;
      case 'task-milestone':
        addFeedItem('milestone', `${msg.milestone?.detail || ''}`);
        send({ action: 'get-tasks' });
        break;
      case 'task-paused':
      case 'task-cancelled':
      case 'task-retrying':
        addFeedItem('task', `${msg.type.replace('task-','')} — ${msg.taskId || ''}`);
        send({ action: 'get-tasks' });
        break;
      case 'task-stream':
        // Live stream from running task — update last feed entry or add new
        break;
      case 'task-tool':
        addFeedItem('task', `tool: ${msg.tool} (${msg.taskId})`);
        break;
      case 'task-budget-blocked':
        addFeedItem('error', `Budget blocked: ${msg.message}`);
        break;
    }
  }

  // ─── Dispatch Handler ───
  document.getElementById('dispatchBtn').addEventListener('click', () => {
    const task = document.getElementById('dispatchTask').value.trim();
    if (!task) return;
    const projectId = document.getElementById('dispatchProject').value || undefined;
    const mode = document.getElementById('dispatchMode').value;
    const model = document.getElementById('dispatchModel').value || undefined;
    const budget = parseFloat(document.getElementById('dispatchBudget').value) || undefined;

    send({ action: 'dispatch', projectId, task, mode, model, maxBudget: budget });
    document.getElementById('dispatchTask').value = '';
    addFeedItem('dispatch', `Sending: "${task.slice(0,50)}..." → ${projectId || 'general'}`);
  });

  // Ctrl+Enter to dispatch
  document.getElementById('dispatchTask').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault();
      document.getElementById('dispatchBtn').click();
    }
  });

  // ─── Bootstrap Handlers ───
  window.bootstrapProject = function(projectId) {
    send({ action: 'bootstrap-project', projectId });
    addFeedItem('bootstrap', `Bootstrapping ${projectId}...`);
  };

  document.getElementById('bootstrapAllBtn').addEventListener('click', () => {
    send({ action: 'bootstrap-all' });
    addFeedItem('bootstrap', 'Bootstrapping all projects...');
  });

  // ─── Task Control ───
  window.controlTask = function(taskId, action) {
    fetch(`/api/tasks/${taskId}/control`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action }),
    }).then(r => r.json()).then(result => {
      addFeedItem('task', `${action}: ${result.success ? 'OK' : result.error}`);
      send({ action: 'get-tasks' });
    });
  };

  // ─── Auto-refresh tasks every 5s ───
  setInterval(() => {
    if (state.ws?.readyState === WebSocket.OPEN) {
      send({ action: 'get-tasks' });
    }
  }, 5000);

  // ─── Init ───
  connect();
  renderFeed();
})();
</script>
</body>
</html>
