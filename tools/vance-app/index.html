<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VANCE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060a; --bg2: #0c0c14; --surface: #10101c; --surface2: #181828; --surface3: #1e1e32;
    --border: #1e1e30; --text: #e4e4f0; --text-dim: #6a6a88; --text-muted: #3a3a55;
    --accent: #3882ff; --accent-glow: rgba(56,130,255,0.15); --accent2: #00e5a0;
    --accent2-glow: rgba(0,229,160,0.12); --warn: #ff9940; --danger: #ff3355;
    --mono: 'Space Mono', monospace; --sans: 'Inter', -apple-system, sans-serif;
    --radius: 16px; --radius-sm: 10px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  ::selection { background: var(--accent); color: white; }
  ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* ─── TOP BAR ─── */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:12px 24px; border-bottom:1px solid var(--border); background:rgba(6,6,10,0.92); backdrop-filter:blur(20px); z-index:100; flex-shrink:0; }
  .topbar-left { display:flex; align-items:center; gap:14px; }
  .logo { font-family:var(--mono); font-size:15px; font-weight:700; letter-spacing:6px; color:var(--accent); }
  .status-badge { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; padding:4px 10px; border-radius:20px; border:1px solid var(--border); color:var(--text-dim); display:flex; align-items:center; gap:6px; }
  .status-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); box-shadow:0 0 8px var(--accent2); animation:pulse 2.5s ease infinite; }
  .status-dot.busy { background:var(--warn); box-shadow:0 0 8px var(--warn); }
  .status-dot.offline { background:var(--danger); box-shadow:none; animation:none; }
  .status-dot.nokey { background:var(--warn); box-shadow:0 0 8px var(--warn); animation:none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .topbar-right { display:flex; align-items:center; gap:8px; }
  .nav-btn { font-family:var(--mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:7px 14px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-dim); cursor:pointer; transition:all .15s; text-decoration:none; }
  .nav-btn:hover { border-color:var(--accent); color:var(--text); }
  .nav-btn.active { background:var(--accent); border-color:var(--accent); color:white; }

  /* ─── MAIN ─── */
  .main { display:flex; flex:1; overflow:hidden; }

  /* ─── SIDEBAR ─── */
  .sidebar { width:260px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--bg2); flex-shrink:0; overflow-y:auto; }
  .sidebar-section { padding:14px 16px; border-bottom:1px solid var(--border); }
  .sidebar-label { font-family:var(--mono); font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
  .project-card { padding:9px 11px; border-radius:8px; cursor:pointer; transition:all .12s; margin-bottom:3px; border:1px solid transparent; }
  .project-card:hover { background:var(--surface); border-color:var(--border); }
  .project-card.active { background:var(--surface2); border-color:var(--accent); }
  .project-card h4 { font-size:12px; font-weight:600; }
  .project-card p { font-size:9px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .project-progress { height:2px; background:var(--surface3); border-radius:1px; margin-top:5px; overflow:hidden; }
  .project-progress .fill { height:100%; background:var(--accent2); border-radius:1px; }
  .new-project-btn { width:100%; padding:8px; border:1px dashed var(--border); border-radius:8px; background:transparent; color:var(--text-muted); font-family:var(--mono); font-size:9px; cursor:pointer; transition:all .15s; }
  .new-project-btn:hover { border-color:var(--accent); color:var(--accent); }

  .milestone-item { display:flex; align-items:flex-start; gap:7px; padding:4px 0; font-size:10px; }
  .milestone-dot { width:7px; height:7px; border-radius:50%; background:var(--accent2); margin-top:3px; flex-shrink:0; }
  .milestone-text { color:var(--text-dim); }

  .sidebar-info { padding:10px 16px; font-family:var(--mono); font-size:9px; color:var(--text-muted); border-top:1px solid var(--border); margin-top:auto; }
  .sidebar-info span { color:var(--accent); }

  /* ─── CHAT ─── */
  .chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .messages { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:12px; }

  .msg { max-width:82%; animation:fadeIn .2s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self:flex-end; }
  .msg.user .bubble { background:var(--accent); color:white; border-radius:14px 14px 4px 14px; padding:10px 14px; font-size:13px; line-height:1.5; }
  .msg.assistant .bubble { background:var(--surface); border:1px solid var(--border); border-radius:14px 14px 14px 4px; padding:12px 16px; font-size:13px; line-height:1.6; }
  .msg .meta { font-family:var(--mono); font-size:8px; color:var(--text-muted); margin-top:3px; padding:0 4px; }
  .msg.user .meta { text-align:right; }

  .bubble code { font-family:var(--mono); font-size:11px; background:rgba(56,130,255,.1); padding:1px 5px; border-radius:4px; }
  .bubble pre { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px; margin:6px 0; overflow-x:auto; font-family:var(--mono); font-size:10px; line-height:1.6; }

  .thinking { display:flex; align-items:center; gap:8px; padding:10px 16px; background:var(--surface); border:1px solid var(--border); border-radius:14px; max-width:220px; animation:fadeIn .2s; }
  .thinking-dots { display:flex; gap:4px; }
  .thinking-dots span { width:5px; height:5px; border-radius:50%; background:var(--accent); animation:bounce 1.2s ease infinite; }
  .thinking-dots span:nth-child(2){animation-delay:.15s} .thinking-dots span:nth-child(3){animation-delay:.3s}
  @keyframes bounce { 0%,80%,100%{opacity:.3} 40%{opacity:1} }
  .thinking-label { font-family:var(--mono); font-size:9px; color:var(--text-dim); }

  .fn-badge { display:inline-flex; align-items:center; gap:4px; font-family:var(--mono); font-size:8px; padding:3px 8px; border-radius:4px; background:rgba(56,130,255,.08); border:1px solid rgba(56,130,255,.15); color:var(--accent); margin:2px; }
  .milestone-bubble { display:flex; align-items:center; gap:8px; padding:8px 12px; border-radius:10px; background:var(--accent2-glow); border:1px solid rgba(0,229,160,.25); margin:6px 0; animation:milestoneIn .4s ease; }
  @keyframes milestoneIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  .milestone-bubble .m-text { font-size:11px; font-weight:600; color:var(--accent2); }

  .stream-text { white-space:pre-wrap; word-break:break-word; }

  /* ─── INPUT ─── */
  .input-area { padding:14px 24px 18px; border-top:1px solid var(--border); background:var(--bg2); flex-shrink:0; }
  .input-row { display:flex; gap:8px; align-items:flex-end; }
  .input-field { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; color:var(--text); font-family:var(--sans); font-size:13px; line-height:1.4; resize:none; min-height:44px; max-height:140px; transition:border-color .15s; }
  .input-field:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-glow); }
  .input-field::placeholder { color:var(--text-muted); }

  .circle-btn { width:44px; height:44px; border-radius:50%; border:2px solid var(--border); background:var(--surface); color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s; flex-shrink:0; }
  .circle-btn:hover { border-color:var(--accent); color:var(--accent); }
  .circle-btn svg { width:18px; height:18px; fill:currentColor; }
  .circle-btn.recording { border-color:var(--danger); background:rgba(255,51,85,.1); color:var(--danger); animation:voicePulse 1s ease infinite; }
  @keyframes voicePulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,51,85,.3)} 50%{box-shadow:0 0 0 10px rgba(255,51,85,0)} }
  .send-btn { background:var(--accent); border-color:var(--accent); color:white; }
  .send-btn:hover { transform:scale(1.05); box-shadow:0 0 16px var(--accent-glow); }
  .send-btn:disabled { opacity:.3; cursor:not-allowed; transform:none; }

  /* ─── WELCOME ─── */
  .welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; text-align:center; padding:40px; }
  .orb { width:70px; height:70px; border-radius:50%; background:radial-gradient(circle at 35% 35%, var(--accent), transparent 70%); opacity:.2; animation:orbFloat 4s ease infinite; }
  @keyframes orbFloat { 0%,100%{transform:translateY(0) scale(1);opacity:.2} 50%{transform:translateY(-8px) scale(1.05);opacity:.35} }
  .welcome-logo { font-family:var(--mono); font-size:28px; font-weight:700; letter-spacing:10px; color:var(--accent); text-shadow:0 0 40px var(--accent-glow); }
  .welcome-sub { font-size:13px; color:var(--text-dim); max-width:380px; line-height:1.7; }
  .welcome-hint { font-family:var(--mono); font-size:9px; color:var(--text-muted); margin-top:16px; }
  .key-warning { background:rgba(255,153,64,.08); border:1px solid rgba(255,153,64,.25); border-radius:10px; padding:10px 16px; font-family:var(--mono); font-size:10px; color:var(--warn); margin-top:12px; max-width:400px; text-align:center; line-height:1.6; }

  /* ─── MODAL ─── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(6,6,10,.85); z-index:500; align-items:center; justify-content:center; backdrop-filter:blur(8px); }
  .modal-overlay.visible { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:400px; max-width:90vw; box-shadow:0 24px 80px rgba(0,0,0,.6); }
  .modal h2 { font-family:var(--mono); font-size:12px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
  .modal-field { margin-bottom:12px; }
  .modal-field label { display:block; font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); margin-bottom:5px; }
  .modal-field input, .modal-field textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:9px 12px; color:var(--text); font-family:var(--sans); font-size:12px; }
  .modal-field input:focus, .modal-field textarea:focus { outline:none; border-color:var(--accent); }
  .modal-field textarea { min-height:50px; resize:vertical; }
  .modal-actions { display:flex; gap:8px; margin-top:16px; }
  .modal-btn { flex:1; padding:9px; border-radius:8px; font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .15s; border:1px solid var(--border); background:transparent; color:var(--text-dim); }
  .modal-btn:hover { border-color:var(--text-dim); color:var(--text); }
  .modal-btn.primary { background:var(--accent); border-color:var(--accent); color:white; }

  @media (max-width:768px) { .sidebar{display:none} .topbar{padding:10px 16px} .messages{padding:14px} .input-area{padding:10px 14px 14px} }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">VANCE</div>
    <div class="status-badge"><div class="status-dot offline" id="statusDot"></div><span id="statusText">Connecting</span></div>
  </div>
  <div class="topbar-right">
    <button class="nav-btn active" id="navChat">Chat</button>
    <a class="nav-btn" href="/costs">Costs</a>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Projects</div>
      <div id="projectList"></div>
      <button class="new-project-btn" onclick="showModal()">+ New Project</button>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-label">Milestones</div>
      <div id="milestoneList"><span style="font-size:9px;color:var(--text-muted)">None yet</span></div>
    </div>
    <div class="sidebar-info">
      <span id="memCount">0</span> memories &middot; <span id="skillCount">0</span> skills
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="orb"></div>
        <div class="welcome-logo">VANCE</div>
        <div class="welcome-sub">Your personal AI assistant. Talk naturally — I'll build, manage, and ship your projects.</div>
        <div class="welcome-hint">Type or hold the mic to speak</div>
        <div class="key-warning" id="keyWarning" style="display:none">
          No OpenAI API key set.<br>Run: <code>export OPENAI_API_KEY=sk-...</code> then restart.
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <button class="circle-btn" id="voiceBtn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart.prevent="startVoice()" ontouchend.prevent="stopVoice()">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <textarea class="input-field" id="inputField" placeholder="Talk to Vance..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="circle-btn send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)hideModal()">
  <div class="modal">
    <h2>New Project</h2>
    <div class="modal-field"><label>Name</label><input id="projName" placeholder="My App" /></div>
    <div class="modal-field"><label>Description</label><textarea id="projDesc" placeholder="What should it do?"></textarea></div>
    <div class="modal-field"><label>Directory (optional)</label><input id="projDir" placeholder="~/Claude Test/my-app" /></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="hideModal()">Cancel</button>
      <button class="modal-btn primary" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<script>
let ws, activeProject=null, projects=[], isBusy=false, recognition=null, isRecording=false, streamEl=null;

function connect() {
  ws = new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws`);
  ws.onopen = () => { setStatus('online','Online'); wsSend({action:'list-projects'}); wsSend({action:'get-memories'}); wsSend({action:'get-skills'}); };
  ws.onclose = () => { setStatus('offline','Offline'); setTimeout(connect,3000); };
  ws.onerror = () => setStatus('offline','Error');
  ws.onmessage = e => handle(JSON.parse(e.data));
}
function wsSend(d) { if(ws?.readyState===1) ws.send(JSON.stringify(d)); }
function setStatus(s,t) {
  const d=document.getElementById('statusDot');
  d.className='status-dot'+(s==='busy'?' busy':s==='offline'?' offline':s==='nokey'?' nokey':'');
  document.getElementById('statusText').textContent=t;
}

function handle(d) {
  switch(d.type) {
    case 'connected':
      if(!d.hasKey) { setStatus('nokey','No API Key'); document.getElementById('keyWarning').style.display='block'; }
      break;
    case 'projects': projects=d.projects; renderProjects(); break;
    case 'project-created': projects.push({...d.project,milestones:[]}); renderProjects(); selectProject(d.project.id); hideModal(); break;
    case 'thinking': setStatus('busy','Thinking'); isBusy=true; showThinking(); break;
    case 'status': updateThinking(d.text); break;
    case 'response': setStatus('online','Online'); isBusy=false; removeThinking(); addMsg('assistant',d.content); speak(summarize(d.content)); break;
    case 'claude-stream': removeThinking(); appendStream(d.content); break;
    case 'claude-tool': appendFn(d.name); break;
    case 'function-call': removeThinking(); appendFn(d.name); break;
    case 'milestone': appendMilestone(d.title); refreshMilestones(); speak('Milestone: '+d.title); break;
    case 'error': setStatus('online','Online'); isBusy=false; removeThinking(); addMsg('assistant','Error: '+d.message); break;
    case 'conversation': renderConv(d.messages); break;
    case 'milestones': renderMilestones(d.milestones); break;
    case 'memories': document.getElementById('memCount').textContent=d.stats?.total||0; break;
    case 'skills': document.getElementById('skillCount').textContent=d.skills?.length||0; break;
  }
}

// ─── Projects ───
function renderProjects() {
  const el=document.getElementById('projectList'); el.innerHTML='';
  // "General" always first
  const gc=document.createElement('div');
  gc.className='project-card'+(activeProject===null?' active':'');
  gc.onclick=()=>selectProject(null);
  gc.innerHTML='<h4>General</h4><p>No project context</p>';
  el.appendChild(gc);
  for(const p of projects) {
    const c=document.createElement('div');
    c.className='project-card'+(p.id===activeProject?' active':'');
    c.onclick=()=>selectProject(p.id);
    const mc=p.milestones?.length||0;
    c.innerHTML=`<h4>${p.name}</h4><p>${p.description||p.directory||''}</p>${mc?`<div class="project-progress"><div class="fill" style="width:${Math.min(mc*12,100)}%"></div></div>`:''}`;
    el.appendChild(c);
  }
}
function selectProject(id) {
  activeProject=id; renderProjects();
  wsSend({action:'get-conversation',convId:id||'general'});
  if(id) wsSend({action:'get-milestones',projectId:id});
  else document.getElementById('milestoneList').innerHTML='<span style="font-size:9px;color:var(--text-muted)">Select a project</span>';
}
function renderConv(msgs) {
  const el=document.getElementById('messages'); el.innerHTML='';
  if(!msgs.length) { el.innerHTML=`<div class="welcome" id="welcome"><div class="orb"></div><div class="welcome-logo">VANCE</div><div class="welcome-sub">${activeProject?'Ready to work on this project.':'Talk to me about anything.'}</div></div>`; return; }
  for(const m of msgs) if(m.role==='user'||m.role==='assistant') addMsgDirect(m.role,m.content,false);
  scrollBottom();
}
function renderMilestones(ms) {
  const el=document.getElementById('milestoneList');
  if(!ms?.length) { el.innerHTML='<span style="font-size:9px;color:var(--text-muted)">None yet</span>'; return; }
  el.innerHTML=ms.map(m=>`<div class="milestone-item"><div class="milestone-dot"></div><div class="milestone-text">${m.title}</div></div>`).join('');
}
function refreshMilestones() { if(activeProject) wsSend({action:'get-milestones',projectId:activeProject}); }

// ─── Messages ───
function addMsg(role,content) { addMsgDirect(role,content,true); }
function addMsgDirect(role,content,scroll=true) {
  document.getElementById('welcome')?.remove();
  const el=document.getElementById('messages'), d=document.createElement('div');
  d.className='msg '+role;
  d.innerHTML=`<div class="bubble">${renderMd(content||'')}</div><div class="meta">${new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
  el.appendChild(d); if(scroll) scrollBottom();
}
function showThinking() {
  removeThinking();
  const el=document.getElementById('messages'), d=document.createElement('div');
  d.className='thinking'; d.id='thinkInd';
  d.innerHTML='<div class="thinking-dots"><span></span><span></span><span></span></div><span class="thinking-label" id="thinkLabel">Thinking</span>';
  el.appendChild(d); scrollBottom();
}
function updateThinking(t) { const l=document.getElementById('thinkLabel'); if(l) l.textContent=t; }
function removeThinking() { document.getElementById('thinkInd')?.remove(); }

function appendStream(text) {
  if(!streamEl) {
    document.getElementById('welcome')?.remove();
    const el=document.getElementById('messages'), d=document.createElement('div');
    d.className='msg assistant'; d.innerHTML='<div class="bubble"><span class="stream-text"></span></div>';
    el.appendChild(d); streamEl=d.querySelector('.stream-text');
  }
  streamEl.textContent+=text; scrollBottom();
}
function appendFn(name) {
  const el=document.getElementById('messages');
  // Insert badge inline in current stream or as standalone
  const badge=document.createElement('span');
  badge.className='fn-badge'; badge.textContent=name;
  if(streamEl) { streamEl.closest('.bubble').appendChild(badge); }
  else { el.appendChild(badge); }
  scrollBottom();
}
function appendMilestone(title) {
  const el=document.getElementById('messages'), d=document.createElement('div');
  d.className='milestone-bubble';
  d.innerHTML=`<span style="color:var(--accent2);font-size:14px">&#9670;</span><span class="m-text">${title}</span>`;
  el.appendChild(d); scrollBottom();
}

function renderMd(t) {
  if(!t) return '';
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}
function scrollBottom() { const el=document.getElementById('messages'); el.scrollTop=el.scrollHeight; }

// ─── Input ───
function send() {
  const inp=document.getElementById('inputField'), text=inp.value.trim();
  if(!text||isBusy) return;
  streamEl=null;
  addMsg('user',text);
  wsSend({action:'chat',message:text,projectId:activeProject});
  inp.value=''; inp.style.height='auto';
}
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }

// ─── Voice ───
function startVoice() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  recognition=new SR(); recognition.continuous=false; recognition.interimResults=true; recognition.lang='en-US';
  let final='';
  const inp=document.getElementById('inputField');
  recognition.onresult=e=>{let interim='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}inp.value=final+interim;};
  recognition.onend=()=>{isRecording=false;document.getElementById('voiceBtn').classList.remove('recording');if(final.trim()){inp.value=final.trim();setTimeout(send,300);}};
  recognition.start(); isRecording=true; document.getElementById('voiceBtn').classList.add('recording');
}
function stopVoice() { if(recognition&&isRecording) recognition.stop(); }

// ─── Speech ───
function speak(text) {
  if(!text||!window.speechSynthesis) return;
  const clean=text.replace(/```[\s\S]*?```/g,'code block').replace(/`[^`]+`/g,'').replace(/<[^>]+>/g,'').substring(0,300);
  if(!clean.trim()) return;
  const u=new SpeechSynthesisUtterance(clean); u.rate=1.05; u.pitch=.95;
  const voices=speechSynthesis.getVoices();
  const pref=voices.find(v=>v.name.includes('Daniel')||v.name.includes('Alex')||v.name.includes('Samantha'));
  if(pref) u.voice=pref;
  speechSynthesis.speak(u);
}
function summarize(t) { if(!t) return ''; const s=t.split(/[.!?\n]/)[0]; return s.length>200?s.substring(0,200):s; }
speechSynthesis?.addEventListener?.('voiceschanged',()=>speechSynthesis.getVoices());

// ─── Modal ───
function showModal() { document.getElementById('modal').classList.add('visible'); document.getElementById('projName').focus(); }
function hideModal() { document.getElementById('modal').classList.remove('visible'); }
function createProject() {
  const n=document.getElementById('projName').value.trim(); if(!n) return;
  wsSend({action:'create-project',name:n,description:document.getElementById('projDesc').value.trim(),directory:document.getElementById('projDir').value.trim()||undefined});
  document.getElementById('projName').value=''; document.getElementById('projDesc').value=''; document.getElementById('projDir').value='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideModal()});

connect();
</script>
