<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VANCE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060a;
    --bg2: #0c0c14;
    --surface: #10101c;
    --surface2: #181828;
    --surface3: #1e1e32;
    --border: #1e1e30;
    --border-glow: rgba(56, 130, 255, 0.25);
    --text: #e4e4f0;
    --text-dim: #6a6a88;
    --text-muted: #3a3a55;
    --accent: #3882ff;
    --accent-glow: rgba(56, 130, 255, 0.15);
    --accent2: #00e5a0;
    --accent2-glow: rgba(0, 229, 160, 0.12);
    --warn: #ff9940;
    --danger: #ff3355;
    --mono: 'Space Mono', monospace;
    --sans: 'Inter', -apple-system, sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  ::selection { background: var(--accent); color: white; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ─── TOP BAR ─── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(6,6,10,0.9);
    backdrop-filter: blur(20px);
    z-index: 100;
    flex-shrink: 0;
  }

  .topbar-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    font-family: var(--mono);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 6px;
    color: var(--accent);
  }

  .status-badge {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .status-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    box-shadow: 0 0 8px var(--accent2);
    animation: pulse 2.5s ease infinite;
  }
  .status-dot.busy { background: var(--warn); box-shadow: 0 0 8px var(--warn); }
  .status-dot.offline { background: var(--danger); box-shadow: none; animation: none; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .nav-btn {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--text); }
  .nav-btn.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* ─── MAIN LAYOUT ─── */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* ─── SIDEBAR ─── */
  .sidebar {
    width: 280px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--bg2);
    flex-shrink: 0;
  }

  .sidebar-section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-label {
    font-family: var(--mono);
    font-size: 8px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .project-card {
    padding: 10px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all 0.12s;
    margin-bottom: 4px;
    border: 1px solid transparent;
  }
  .project-card:hover { background: var(--surface); border-color: var(--border); }
  .project-card.active { background: var(--surface2); border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent-glow); }

  .project-card h4 {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 2px;
  }
  .project-card p {
    font-size: 10px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .project-progress {
    height: 2px;
    background: var(--surface3);
    border-radius: 1px;
    margin-top: 6px;
    overflow: hidden;
  }
  .project-progress .fill { height: 100%; background: var(--accent2); border-radius: 1px; transition: width 0.5s; }

  .new-project-btn {
    width: 100%;
    padding: 10px;
    border: 1px dashed var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 10px;
    cursor: pointer;
    transition: all 0.15s;
    margin-top: 8px;
  }
  .new-project-btn:hover { border-color: var(--accent); color: var(--accent); }

  .milestone-list {
    max-height: 200px;
    overflow-y: auto;
    flex: 1;
  }

  .milestone-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 6px 0;
    font-size: 11px;
  }

  .milestone-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent2);
    margin-top: 4px;
    flex-shrink: 0;
  }
  .milestone-dot.pending { background: var(--text-muted); }

  .milestone-text { color: var(--text-dim); }
  .milestone-text.done { color: var(--text); }

  /* ─── CHAT AREA ─── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg {
    max-width: 85%;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  .msg.user {
    align-self: flex-end;
  }

  .msg.user .msg-bubble {
    background: var(--accent);
    color: white;
    border-radius: var(--radius) var(--radius) 4px var(--radius);
    padding: 12px 16px;
    font-size: 14px;
    line-height: 1.5;
  }

  .msg.assistant .msg-bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) var(--radius) 4px;
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.6;
  }

  .msg .msg-meta {
    font-family: var(--mono);
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 4px;
    padding: 0 4px;
  }
  .msg.user .msg-meta { text-align: right; }

  .msg-bubble code {
    font-family: var(--mono);
    font-size: 12px;
    background: rgba(56, 130, 255, 0.1);
    padding: 1px 5px;
    border-radius: 4px;
  }

  .msg-bubble pre {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-family: var(--mono);
    font-size: 11px;
    line-height: 1.6;
  }

  /* Thinking indicator */
  .thinking {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    max-width: 200px;
    animation: fadeIn 0.2s ease;
  }

  .thinking-dots {
    display: flex;
    gap: 4px;
  }
  .thinking-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: bounce 1.2s ease infinite;
  }
  .thinking-dots span:nth-child(2) { animation-delay: 0.15s; }
  .thinking-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,80%,100% { opacity: 0.3; } 40% { opacity: 1; } }

  .thinking-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  /* Streaming chunk */
  .stream-text {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .tool-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.5px;
    padding: 3px 8px;
    border-radius: 4px;
    background: rgba(56, 130, 255, 0.08);
    border: 1px solid rgba(56, 130, 255, 0.15);
    color: var(--accent);
    margin: 2px 2px;
  }

  .milestone-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-radius: var(--radius-sm);
    background: var(--accent2-glow);
    border: 1px solid rgba(0, 229, 160, 0.25);
    margin: 8px 0;
    animation: milestoneIn 0.4s ease;
  }
  @keyframes milestoneIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

  .milestone-badge .icon { font-size: 16px; }
  .milestone-badge .text {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent2);
  }

  /* ─── INPUT AREA ─── */
  .input-area {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    max-width: 100%;
  }

  .input-field {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 18px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    line-height: 1.4;
    resize: none;
    min-height: 48px;
    max-height: 160px;
    transition: border-color 0.15s;
  }
  .input-field:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  .input-field::placeholder { color: var(--text-muted); }

  .voice-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .voice-btn:hover { border-color: var(--accent); color: var(--accent); }
  .voice-btn.recording {
    border-color: var(--danger);
    background: rgba(255, 51, 85, 0.1);
    color: var(--danger);
    animation: voicePulse 1s ease infinite;
  }
  @keyframes voicePulse { 0%,100% { box-shadow: 0 0 0 0 rgba(255,51,85,0.3); } 50% { box-shadow: 0 0 0 10px rgba(255,51,85,0); } }

  .voice-btn svg { width: 20px; height: 20px; fill: currentColor; }

  .send-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.05); box-shadow: 0 0 20px var(--accent-glow); }
  .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }
  .send-btn svg { width: 18px; height: 18px; fill: currentColor; }

  /* ─── NEW PROJECT MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(6,6,10,0.85);
    z-index: 500;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
  }
  .modal-overlay.visible { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 420px;
    max-width: 90vw;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6);
  }

  .modal h2 {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .modal-field {
    margin-bottom: 14px;
  }

  .modal-field label {
    display: block;
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .modal-field input, .modal-field textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 13px;
  }
  .modal-field input:focus, .modal-field textarea:focus { outline: none; border-color: var(--accent); }
  .modal-field textarea { min-height: 60px; resize: vertical; }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .modal-btn {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
  }
  .modal-btn:hover { border-color: var(--text-dim); color: var(--text); }
  .modal-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .modal-btn.primary:hover { opacity: 0.9; }

  /* ─── Welcome State ─── */
  .welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    text-align: center;
    padding: 40px;
  }

  .welcome-logo {
    font-family: var(--mono);
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 12px;
    color: var(--accent);
    text-shadow: 0 0 40px var(--accent-glow);
  }

  .welcome-sub {
    font-size: 14px;
    color: var(--text-dim);
    max-width: 400px;
    line-height: 1.7;
  }

  .welcome-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-muted);
    margin-top: 24px;
  }

  .orb {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, var(--accent), transparent 70%);
    opacity: 0.2;
    animation: orbFloat 4s ease infinite;
    margin-bottom: 8px;
  }
  @keyframes orbFloat { 0%,100% { transform: translateY(0) scale(1); opacity: 0.2; } 50% { transform: translateY(-8px) scale(1.05); opacity: 0.35; } }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .topbar { padding: 10px 16px; }
    .messages { padding: 16px; }
    .input-area { padding: 12px 16px 16px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">VANCE</div>
    <div class="status-badge">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">Connecting</span>
    </div>
  </div>
  <div class="topbar-right">
    <button class="nav-btn active" onclick="switchView('chat')">Chat</button>
    <button class="nav-btn" onclick="switchView('projects')">Projects</button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section" style="flex-shrink:0">
      <div class="sidebar-label">Projects</div>
      <div id="projectList"></div>
      <button class="new-project-btn" onclick="showNewProject()">+ New Project</button>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-label">Milestones</div>
      <div class="milestone-list" id="milestoneList">
        <div style="font-size:10px;color:var(--text-muted)">No milestones yet</div>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="orb"></div>
        <div class="welcome-logo">VANCE</div>
        <div class="welcome-sub">
          Your personal AI assistant. Talk naturally — I'll build, manage, and ship your projects. Just tell me what you need.
        </div>
        <div class="welcome-hint">Type or hold the mic button to speak</div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-row">
        <button class="voice-btn" id="voiceBtn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart="startVoice()" ontouchend="stopVoice()">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <textarea class="input-field" id="inputField" placeholder="Talk to Vance..." rows="1" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<!-- New Project Modal -->
<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <h2>New Project</h2>
    <div class="modal-field">
      <label>Name</label>
      <input id="projName" placeholder="My New App" />
    </div>
    <div class="modal-field">
      <label>Description</label>
      <textarea id="projDesc" placeholder="What should this project do?"></textarea>
    </div>
    <div class="modal-field">
      <label>Directory (optional)</label>
      <input id="projDir" placeholder="Auto: ~/Claude Test/project-name" />
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="hideNewProject()">Cancel</button>
      <button class="modal-btn primary" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<script>
// ─── State ───
let ws = null;
let activeProject = null;
let projects = [];
let isRecording = false;
let recognition = null;
let isBusy = false;
let currentStreamEl = null;
let speechQueue = [];
let isSpeaking = false;

// ─── WebSocket ───
function connect() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${protocol}//${location.host}/ws`);

  ws.onopen = () => {
    setStatus('online', 'Online');
    ws.send(JSON.stringify({ action: 'list-projects' }));
  };

  ws.onclose = () => {
    setStatus('offline', 'Offline');
    setTimeout(connect, 3000);
  };

  ws.onerror = () => setStatus('offline', 'Error');

  ws.onmessage = (e) => {
    const data = JSON.parse(e.data);
    handleWS(data);
  };
}

function wsSend(data) {
  if (ws?.readyState === 1) ws.send(JSON.stringify(data));
}

function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot' + (state === 'busy' ? ' busy' : state === 'offline' ? ' offline' : '');
  document.getElementById('statusText').textContent = text;
}

// ─── WebSocket Handler ───
function handleWS(data) {
  switch (data.type) {
    case 'connected':
      break;

    case 'projects':
      projects = data.projects;
      renderProjects();
      break;

    case 'project-created':
      projects.push({ ...data.project, milestones: [] });
      renderProjects();
      selectProject(data.project.id);
      hideNewProject();
      break;

    case 'ack':
      break;

    case 'thinking':
      setStatus('busy', 'Thinking');
      isBusy = true;
      showThinking();
      break;

    case 'stream':
      removeThinking();
      if (data.content !== undefined && data.type === 'stream') {
        // Handle nested type from server (chunk type inside stream)
      }
      if (data.content) {
        appendStream(data.content);
      }
      if (data.name) {
        appendTool(data.name);
      }
      break;

    case 'milestone':
      appendMilestone(data.title);
      renderMilestones();
      speak(`Milestone reached: ${data.title}`);
      break;

    case 'done':
      setStatus('online', 'Online');
      isBusy = false;
      finalizeStream(data.output);
      speak(summarize(data.output));
      break;

    case 'error':
      setStatus('online', 'Online');
      isBusy = false;
      removeThinking();
      addMessage('assistant', `Something went wrong: ${data.message}`);
      break;

    case 'conversation':
      renderConversation(data.messages);
      break;

    case 'milestones':
      renderMilestonesData(data.milestones);
      break;
  }
}

// ─── Render ───
function renderProjects() {
  const el = document.getElementById('projectList');
  el.innerHTML = '';
  for (const p of projects) {
    const card = document.createElement('div');
    card.className = `project-card ${p.id === activeProject ? 'active' : ''}`;
    card.onclick = () => selectProject(p.id);
    const milestoneCount = p.milestones?.length || 0;
    card.innerHTML = `
      <h4>${p.name}</h4>
      <p>${p.description || 'No description'}</p>
      ${milestoneCount ? `<div class="project-progress"><div class="fill" style="width:${Math.min(milestoneCount * 15, 100)}%"></div></div>` : ''}
    `;
    el.appendChild(card);
  }
}

function selectProject(id) {
  activeProject = id;
  renderProjects();
  // Load conversation and milestones
  wsSend({ action: 'get-conversation', convId: id });
  wsSend({ action: 'get-milestones', projectId: id });
}

function renderConversation(messages) {
  const el = document.getElementById('messages');
  el.innerHTML = '';
  if (!messages.length) {
    el.innerHTML = `<div class="welcome" id="welcome">
      <div class="orb"></div>
      <div class="welcome-logo">VANCE</div>
      <div class="welcome-sub">Ready to work on this project. What should I do?</div>
    </div>`;
    return;
  }
  for (const m of messages) {
    addMessageDirect(m.role, m.content, false);
  }
  scrollToBottom();
}

function renderMilestones() {
  if (activeProject) {
    wsSend({ action: 'get-milestones', projectId: activeProject });
  }
}

function renderMilestonesData(milestones) {
  const el = document.getElementById('milestoneList');
  if (!milestones?.length) {
    el.innerHTML = '<div style="font-size:10px;color:var(--text-muted)">No milestones yet</div>';
    return;
  }
  el.innerHTML = milestones.map(m => `
    <div class="milestone-item">
      <div class="milestone-dot"></div>
      <div class="milestone-text done">${m.title}</div>
    </div>
  `).join('');
}

// ─── Messages ───
function addMessage(role, content) {
  addMessageDirect(role, content, true);
}

function addMessageDirect(role, content, scroll = true) {
  const welcome = document.getElementById('welcome');
  if (welcome) welcome.remove();

  const el = document.getElementById('messages');
  const msg = document.createElement('div');
  msg.className = `msg ${role}`;

  const rendered = renderMarkdown(content);
  msg.innerHTML = `
    <div class="msg-bubble">${rendered}</div>
    <div class="msg-meta">${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</div>
  `;
  el.appendChild(msg);
  if (scroll) scrollToBottom();
}

function showThinking() {
  removeThinking();
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'thinking';
  div.id = 'thinkingIndicator';
  div.innerHTML = `
    <div class="thinking-dots"><span></span><span></span><span></span></div>
    <span class="thinking-label">Working</span>
  `;
  el.appendChild(div);
  scrollToBottom();
}

function removeThinking() {
  document.getElementById('thinkingIndicator')?.remove();
}

function appendStream(text) {
  if (!currentStreamEl) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const el = document.getElementById('messages');
    const msg = document.createElement('div');
    msg.className = 'msg assistant';
    msg.innerHTML = `<div class="msg-bubble"><span class="stream-text"></span></div>`;
    el.appendChild(msg);
    currentStreamEl = msg.querySelector('.stream-text');
  }
  currentStreamEl.textContent += text;
  scrollToBottom();
}

function appendTool(name) {
  if (!currentStreamEl) return;
  const bubble = currentStreamEl.closest('.msg-bubble');
  const badge = document.createElement('span');
  badge.className = 'tool-badge';
  badge.textContent = name;
  bubble.appendChild(badge);
}

function appendMilestone(title) {
  const el = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'milestone-badge';
  div.innerHTML = `<span class="icon">&#9670;</span><span class="text">${title}</span>`;
  el.appendChild(div);
  scrollToBottom();
}

function finalizeStream(fullOutput) {
  if (currentStreamEl) {
    const bubble = currentStreamEl.closest('.msg-bubble');
    const rendered = renderMarkdown(currentStreamEl.textContent || fullOutput || '');
    // Keep tool badges
    const badges = bubble.querySelectorAll('.tool-badge');
    bubble.innerHTML = rendered;
    badges.forEach(b => bubble.appendChild(b));
    currentStreamEl = null;
  }
  scrollToBottom();
}

function renderMarkdown(text) {
  if (!text) return '';
  return text
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function scrollToBottom() {
  const el = document.getElementById('messages');
  el.scrollTop = el.scrollHeight;
}

// ─── Input ───
function send() {
  const input = document.getElementById('inputField');
  const text = input.value.trim();
  if (!text || isBusy) return;

  addMessage('user', text);
  wsSend({ action: 'chat', message: text, projectId: activeProject });
  input.value = '';
  input.style.height = 'auto';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
  // Auto-resize
  requestAnimationFrame(() => {
    const el = e.target;
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  });
}

// ─── Voice ───
function startVoice() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    alert('Voice not supported in this browser. Use Chrome.');
    return;
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SpeechRecognition();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'en-US';

  const input = document.getElementById('inputField');
  let finalTranscript = '';

  recognition.onresult = (e) => {
    let interim = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        finalTranscript += e.results[i][0].transcript;
      } else {
        interim += e.results[i][0].transcript;
      }
    }
    input.value = finalTranscript + interim;
  };

  recognition.onend = () => {
    isRecording = false;
    document.getElementById('voiceBtn').classList.remove('recording');
    if (finalTranscript.trim()) {
      input.value = finalTranscript.trim();
      // Auto-send after voice
      setTimeout(() => send(), 300);
    }
  };

  recognition.start();
  isRecording = true;
  document.getElementById('voiceBtn').classList.add('recording');
}

function stopVoice() {
  if (recognition && isRecording) {
    recognition.stop();
  }
}

// ─── Speech Output ───
function speak(text) {
  if (!text || !window.speechSynthesis) return;
  // Clean text for speech
  const clean = text.replace(/```[\s\S]*?```/g, 'code block').replace(/`[^`]+`/g, '').replace(/<[^>]+>/g, '').substring(0, 300);
  if (!clean.trim()) return;

  const utter = new SpeechSynthesisUtterance(clean);
  utter.rate = 1.05;
  utter.pitch = 0.95;
  // Try to find a good voice
  const voices = speechSynthesis.getVoices();
  const preferred = voices.find(v => v.name.includes('Daniel') || v.name.includes('Alex') || v.name.includes('Samantha'));
  if (preferred) utter.voice = preferred;
  speechSynthesis.speak(utter);
}

function summarize(text) {
  if (!text) return '';
  // Take first sentence or first 200 chars
  const firstSentence = text.split(/[.!?\n]/)[0];
  if (firstSentence.length > 200) return firstSentence.substring(0, 200);
  return firstSentence;
}

// Make sure voices are loaded
speechSynthesis?.onvoiceschanged = () => speechSynthesis.getVoices();

// ─── Project Modal ───
function showNewProject() {
  document.getElementById('newProjectModal').classList.add('visible');
  document.getElementById('projName').focus();
}

function hideNewProject() {
  document.getElementById('newProjectModal').classList.remove('visible');
  document.getElementById('projName').value = '';
  document.getElementById('projDesc').value = '';
  document.getElementById('projDir').value = '';
}

function createProject() {
  const name = document.getElementById('projName').value.trim();
  if (!name) return;
  wsSend({
    action: 'create-project',
    name,
    description: document.getElementById('projDesc').value.trim(),
    directory: document.getElementById('projDir').value.trim() || undefined,
  });
}

// ─── Views ───
function switchView(view) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  // Future: switch between chat and project dashboard views
}

// ─── Init ───
connect();

// Close modal on outside click
document.getElementById('newProjectModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) hideNewProject();
});

// Close modal on Escape
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideNewProject();
});
</script>
