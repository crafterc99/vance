<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VANCE — Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="command-center.css">
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════
     LAYER 0: Particle Background (Three.js canvas)
     ═══════════════════════════════════════════════════════════════════════ -->
<canvas id="particleCanvas"></canvas>

<!-- ═══════════════════════════════════════════════════════════════════════
     LAYER 3: Overlay Effects
     ═══════════════════════════════════════════════════════════════════════ -->
<div class="overlay-effects">
  <div class="overlay-scanlines"></div>
  <div class="overlay-vignette"></div>
  <div class="hud-bracket hud-bracket--tl"></div>
  <div class="hud-bracket hud-bracket--tr"></div>
  <div class="hud-bracket hud-bracket--bl"></div>
  <div class="hud-bracket hud-bracket--br"></div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     LAYER 1: Top Bar
     ═══════════════════════════════════════════════════════════════════════ -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">VANCE<span class="logo-symbol">✦</span></div>
    <div class="status-pill">
      <div class="status-dot offline" id="statusDot"></div>
      <span class="status-label" id="statusText">Connecting</span>
    </div>
    <div class="cost-pill" id="costPill">TODAY $0.00</div>
    <div class="tier-indicator tier-haiku" id="tierIndicator">HAIKU</div>
  </div>
  <div class="topbar-right">
    <button class="nav-btn active" id="navChat">Command Center</button>
    <a class="nav-btn" href="/costs">Costs</a>
    <a class="nav-btn" href="/brain">Brain</a>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     LAYER 2: Main Viewport — 3-Column Grid
     ═══════════════════════════════════════════════════════════════════════ -->
<div class="main">

  <!-- ─── Left Column: Projects + System Readout ─── -->
  <div class="col-left">
    <div class="col-section">
      <div class="col-label">Project Nodes</div>
      <div class="project-nodes" id="projectList"></div>
      <button class="new-project-btn" id="newProjectBtn">+ New Project</button>
    </div>

    <div class="system-readout">
      <div class="col-label" style="margin-bottom:6px">System Readout</div>
      <div class="readout-line"><span>Memories</span><span class="val" id="readout-memories">0</span></div>
      <div class="readout-line"><span>Skills</span><span class="val" id="readout-skills">0</span></div>
      <div class="readout-line"><span>Projects</span><span class="val" id="readout-projects">0</span></div>
    </div>
  </div>

  <!-- ─── Center Column: Task Card + Chat + Input ─── -->
  <div class="col-center">

    <!-- Active Task Card (hidden by default) -->
    <div class="task-card" id="taskCard">
      <div class="task-card-header">
        <span class="task-card-title" id="taskTitle">—</span>
        <span class="model-badge sonnet" id="taskModelBadge">SONNET</span>
      </div>
      <div class="task-card-meta">
        <span>Elapsed: <span class="val" id="taskElapsed">0:00</span></span>
        <span>Cost: <span class="val" id="taskCost">$0.00</span></span>
      </div>
      <div class="task-milestones" id="taskMilestones"></div>
      <div class="task-tools" id="taskTools"></div>
      <div class="task-mini-terminal" id="taskTerminal"></div>
    </div>

    <!-- Chat Area -->
    <div class="chat-area">
      <div class="messages" id="messages">
        <!-- Welcome screen injected by JS -->
      </div>
      <div class="input-area">
        <div class="input-row">
          <button class="circle-btn" id="voiceBtn">
            <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
          </button>
          <textarea class="input-field" id="inputField" placeholder="Talk to Vance..." rows="1"></textarea>
          <button class="circle-btn send-btn" id="sendBtn">
            <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
          </button>
        </div>
        <canvas id="voiceWaveform" width="400" height="30"></canvas>
        <div class="input-hints">
          <span><kbd>Enter</kbd> Send</span>
          <span><kbd>Shift+Enter</kbd> New line</span>
          <span>Hold mic for voice</span>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Right Column: Activity Ticker + Telemetry ─── -->
  <div class="col-right">
    <div class="ticker-section">
      <div class="col-section">
        <div class="col-label">Activity Feed</div>
      </div>
      <div class="ticker-feed" id="tickerFeed"></div>
    </div>

    <div class="telemetry-section">
      <div class="col-label" style="margin-bottom:8px">Telemetry</div>
      <div class="telemetry-grid">
        <div class="telem-widget">
          <div class="telem-label">CPU</div>
          <div class="cpu-gauge" id="cpuGauge">
            <svg viewBox="0 0 80 80">
              <circle cx="40" cy="40" r="35" fill="none" stroke="rgba(30,30,50,0.5)" stroke-width="4"/>
            </svg>
            <div class="cpu-gauge-text">—</div>
          </div>
        </div>
        <div class="telem-widget">
          <div class="telem-label">Memory</div>
          <div id="memBar">
            <div class="telem-value" style="font-size:10px">—</div>
            <div class="bar-gauge"><div class="bar-gauge-fill green" style="width:0%"></div></div>
          </div>
        </div>
        <div class="telem-widget">
          <div class="telem-label">Disk</div>
          <div id="diskBar">
            <div class="telem-value" style="font-size:10px">—</div>
            <div class="bar-gauge"><div class="bar-gauge-fill green" style="width:0%"></div></div>
          </div>
        </div>
        <div class="telem-widget">
          <div class="telem-label">Cost</div>
          <div id="costWidget">
            <div class="telem-value" style="color:var(--green)">$0.00</div>
            <div style="font-family:var(--mono);font-size:7px;color:var(--text-muted);margin-top:2px">TODAY</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     LAYER 4: Modal (New Project)
     ═══════════════════════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>New Project</h2>
    <div class="modal-field"><label>Name</label><input id="projName" placeholder="My App" /></div>
    <div class="modal-field"><label>Description</label><textarea id="projDesc" placeholder="What should it do?"></textarea></div>
    <div class="modal-field"><label>Directory (optional)</label><input id="projDir" placeholder="~/Claude Test/my-app" /></div>
    <div class="modal-actions">
      <button class="modal-btn" id="cancelModalBtn">Cancel</button>
      <button class="modal-btn primary" id="createProjectBtn">Create</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════
     Scripts — CDN + Local
     ═══════════════════════════════════════════════════════════════════════ -->
<script src="three.min.js"></script>
<script src="marked.min.js"></script>
<script src="particles.js"></script>
<script src="command-center.js"></script>

</body>
</html>
