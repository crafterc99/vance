<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VANCE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #09090f; --bg2: #0d0d15; --surface: #12121e; --surface2: #181828; --surface3: #1e1e32;
    --border: #1c1c30; --border-light: #282848; --text: #e8e8f4; --text-dim: #7070a0; --text-muted: #404065;
    --accent: #4488ff; --accent-dim: #335599; --accent-glow: rgba(68,136,255,0.12); --accent-bright: #66aaff;
    --green: #00e5a0; --green-glow: rgba(0,229,160,0.10); --green-dim: #009a6a;
    --warn: #ffa040; --danger: #ff3355; --purple: #a855f7;
    --mono: 'JetBrains Mono', monospace; --sans: 'Inter', -apple-system, sans-serif;
    --radius: 14px; --radius-sm: 8px;
    --ease: cubic-bezier(.16,1,.3,1);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  ::selection { background: var(--accent); color: white; }
  ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-light); }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

  /* ─── TOP BAR ─── */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 20px; border-bottom:1px solid var(--border); background:rgba(9,9,15,0.95); backdrop-filter:blur(24px); z-index:100; flex-shrink:0; }
  .topbar-left { display:flex; align-items:center; gap:16px; }
  .logo { font-family:var(--mono); font-size:14px; font-weight:700; letter-spacing:7px; color:var(--accent); }
  .status-pill { display:flex; align-items:center; gap:7px; padding:4px 12px 4px 8px; border-radius:20px; background:var(--surface); border:1px solid var(--border); }
  .status-dot { width:7px; height:7px; border-radius:50%; transition: all .3s; }
  .status-dot.online { background:var(--green); box-shadow:0 0 10px var(--green); }
  .status-dot.busy { background:var(--warn); box-shadow:0 0 10px var(--warn); animation:pulse 1.5s ease infinite; }
  .status-dot.offline { background:var(--danger); box-shadow:none; }
  .status-dot.nokey { background:var(--warn); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-label { font-family:var(--mono); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); }
  .topbar-right { display:flex; align-items:center; gap:6px; }
  .nav-btn { font-family:var(--mono); font-size:9px; letter-spacing:1px; text-transform:uppercase; padding:6px 14px; border-radius:8px; border:1px solid transparent; background:transparent; color:var(--text-dim); cursor:pointer; transition:all .15s var(--ease); text-decoration:none; }
  .nav-btn:hover { color:var(--text); background:var(--surface); }
  .nav-btn.active { background:var(--accent); color:white; border-color:var(--accent); }

  /* ─── MAIN ─── */
  .main { display:flex; flex:1; overflow:hidden; }

  /* ─── SIDEBAR ─── */
  .sidebar { width:260px; border-right:1px solid var(--border); display:flex; flex-direction:column; background:var(--bg2); flex-shrink:0; }
  .sidebar-section { padding:14px 14px 10px; }
  .sidebar-section + .sidebar-section { border-top:1px solid var(--border); }
  .sidebar-label { font-family:var(--mono); font-size:8px; letter-spacing:3px; text-transform:uppercase; color:var(--text-muted); margin-bottom:8px; }
  .project-card { padding:8px 10px; border-radius:var(--radius-sm); cursor:pointer; transition:all .12s var(--ease); margin-bottom:2px; border:1px solid transparent; }
  .project-card:hover { background:var(--surface); border-color:var(--border); }
  .project-card.active { background:var(--surface2); border-color:var(--accent-dim); }
  .project-card h4 { font-size:12px; font-weight:600; color:var(--text); }
  .project-card p { font-size:9px; color:var(--text-dim); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:1px; }
  .project-progress { height:2px; background:var(--surface3); border-radius:1px; margin-top:5px; overflow:hidden; }
  .project-progress .fill { height:100%; background:linear-gradient(90deg,var(--green-dim),var(--green)); border-radius:1px; transition:width .3s; }
  .new-project-btn { width:100%; padding:7px; border:1px dashed var(--border); border-radius:var(--radius-sm); background:transparent; color:var(--text-muted); font-family:var(--mono); font-size:9px; cursor:pointer; transition:all .15s; margin-top:4px; }
  .new-project-btn:hover { border-color:var(--accent); color:var(--accent); }

  .milestone-list { max-height:200px; overflow-y:auto; }
  .milestone-item { display:flex; align-items:flex-start; gap:7px; padding:4px 0; font-size:10px; }
  .milestone-dot { width:6px; height:6px; border-radius:50%; background:var(--green); margin-top:4px; flex-shrink:0; }
  .milestone-text { color:var(--text-dim); line-height:1.4; }

  .sidebar-footer { padding:10px 14px; border-top:1px solid var(--border); margin-top:auto; display:flex; justify-content:space-between; }
  .stat-chip { font-family:var(--mono); font-size:9px; color:var(--text-muted); display:flex; align-items:center; gap:4px; }
  .stat-chip span { color:var(--accent-bright); }

  /* ─── CHAT AREA ─── */
  .chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .messages { flex:1; overflow-y:auto; padding:20px 28px; display:flex; flex-direction:column; gap:6px; }

  /* ─── MESSAGES ─── */
  .msg { animation:msgIn .25s var(--ease); max-width:85%; }
  @keyframes msgIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-self:flex-end; }
  .msg.user .bubble { background:var(--accent); color:white; border-radius:var(--radius) var(--radius) 4px var(--radius); padding:10px 14px; font-size:13px; line-height:1.55; }
  .msg.assistant { align-self:flex-start; }
  .msg.assistant .bubble { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius) var(--radius) var(--radius) 4px; padding:12px 16px; font-size:13px; line-height:1.65; }
  .msg .meta { font-family:var(--mono); font-size:8px; color:var(--text-muted); margin-top:3px; padding:0 4px; }
  .msg.user .meta { text-align:right; }

  /* Markdown inside bubbles */
  .bubble p { margin-bottom:8px; } .bubble p:last-child { margin-bottom:0; }
  .bubble strong { color:var(--accent-bright); font-weight:600; }
  .bubble em { color:var(--text-dim); font-style:italic; }
  .bubble code { font-family:var(--mono); font-size:11px; background:rgba(68,136,255,.1); padding:1px 5px; border-radius:4px; }
  .msg.user .bubble code { background:rgba(255,255,255,.15); }
  .bubble pre { background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:12px 14px; margin:8px 0; overflow-x:auto; font-family:var(--mono); font-size:10.5px; line-height:1.6; position:relative; }
  .bubble pre code { background:none; padding:0; font-size:10.5px; }
  .bubble ul, .bubble ol { margin:6px 0; padding-left:18px; }
  .bubble li { margin-bottom:3px; font-size:13px; }
  .bubble h1,.bubble h2,.bubble h3 { font-size:14px; font-weight:700; color:var(--accent-bright); margin:10px 0 4px; }
  .bubble blockquote { border-left:3px solid var(--accent-dim); padding-left:10px; color:var(--text-dim); margin:6px 0; }
  .bubble a { color:var(--accent-bright); text-decoration:underline; }
  .bubble hr { border:none; border-top:1px solid var(--border); margin:10px 0; }

  /* Streaming cursor */
  .stream-cursor::after { content:''; display:inline-block; width:7px; height:15px; background:var(--accent); border-radius:1px; margin-left:2px; animation:blink .6s step-end infinite; vertical-align:middle; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* Status / tool badges */
  .msg-tools { display:flex; flex-wrap:wrap; gap:4px; margin-top:6px; }
  .fn-badge { display:inline-flex; align-items:center; gap:4px; font-family:var(--mono); font-size:8px; padding:3px 8px; border-radius:4px; background:rgba(68,136,255,.06); border:1px solid rgba(68,136,255,.12); color:var(--accent); }
  .fn-badge .fn-icon { font-size:10px; }
  .fn-badge.done { border-color:rgba(0,229,160,.2); color:var(--green); background:rgba(0,229,160,.06); }

  .milestone-bubble { display:flex; align-items:center; gap:10px; padding:8px 14px; border-radius:10px; background:var(--green-glow); border:1px solid rgba(0,229,160,.2); margin:4px 0; animation:msgIn .3s var(--ease); }
  .milestone-bubble .m-icon { color:var(--green); font-size:16px; }
  .milestone-bubble .m-text { font-size:12px; font-weight:600; color:var(--green); }

  /* Thinking indicator */
  .thinking-bar { display:flex; align-items:center; gap:10px; padding:8px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); max-width:280px; animation:msgIn .2s var(--ease); }
  .thinking-dots { display:flex; gap:3px; }
  .thinking-dots span { width:5px; height:5px; border-radius:50%; background:var(--accent); animation:dotPulse 1.4s ease infinite; }
  .thinking-dots span:nth-child(2){animation-delay:.2s} .thinking-dots span:nth-child(3){animation-delay:.4s}
  @keyframes dotPulse { 0%,80%,100%{transform:scale(.6);opacity:.3} 40%{transform:scale(1);opacity:1} }
  .thinking-text { font-family:var(--mono); font-size:9px; color:var(--text-dim); }

  /* ─── INPUT ─── */
  .input-area { padding:12px 28px 16px; border-top:1px solid var(--border); background:var(--bg2); flex-shrink:0; }
  .input-row { display:flex; gap:8px; align-items:flex-end; }
  .input-field { flex:1; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; color:var(--text); font-family:var(--sans); font-size:13px; line-height:1.45; resize:none; min-height:44px; max-height:140px; transition:border-color .2s, box-shadow .2s; }
  .input-field:focus { outline:none; border-color:var(--accent-dim); box-shadow:0 0 0 3px var(--accent-glow); }
  .input-field::placeholder { color:var(--text-muted); }

  .circle-btn { width:42px; height:42px; border-radius:50%; border:1.5px solid var(--border); background:var(--surface); color:var(--text-dim); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all .2s var(--ease); flex-shrink:0; }
  .circle-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--surface2); }
  .circle-btn svg { width:17px; height:17px; fill:currentColor; }
  .circle-btn.recording { border-color:var(--danger); background:rgba(255,51,85,.08); color:var(--danger); animation:voicePulse 1s ease infinite; }
  @keyframes voicePulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,51,85,.3)} 50%{box-shadow:0 0 0 10px rgba(255,51,85,0)} }
  .send-btn { background:var(--accent); border-color:var(--accent); color:white; }
  .send-btn:hover { transform:scale(1.05); box-shadow:0 0 20px var(--accent-glow); }
  .send-btn:disabled { opacity:.3; cursor:not-allowed; transform:none; box-shadow:none; }

  /* ─── WELCOME ─── */
  .welcome { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:40px; }
  .orb-wrap { position:relative; width:80px; height:80px; }
  .orb { width:80px; height:80px; border-radius:50%; background:radial-gradient(circle at 35% 35%, var(--accent), rgba(68,136,255,.1) 70%, transparent 100%); opacity:.2; animation:orbFloat 5s ease infinite; }
  .orb-ring { position:absolute; inset:-8px; border-radius:50%; border:1px solid rgba(68,136,255,.08); animation:orbFloat 5s ease infinite reverse; }
  @keyframes orbFloat { 0%,100%{transform:translateY(0) scale(1);opacity:.2} 50%{transform:translateY(-10px) scale(1.06);opacity:.35} }
  .welcome-logo { font-family:var(--mono); font-size:32px; font-weight:700; letter-spacing:12px; color:var(--accent); text-shadow:0 0 60px var(--accent-glow); }
  .welcome-sub { font-size:13px; color:var(--text-dim); max-width:400px; line-height:1.8; }
  .welcome-hint { font-family:var(--mono); font-size:9px; color:var(--text-muted); margin-top:10px; letter-spacing:1px; }
  .key-warning { background:rgba(255,153,64,.06); border:1px solid rgba(255,153,64,.2); border-radius:10px; padding:10px 16px; font-family:var(--mono); font-size:10px; color:var(--warn); margin-top:12px; max-width:400px; line-height:1.6; }

  /* ─── MODAL ─── */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(9,9,15,.88); z-index:500; align-items:center; justify-content:center; backdrop-filter:blur(12px); }
  .modal-overlay.visible { display:flex; }
  .modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:24px; width:400px; max-width:90vw; box-shadow:0 24px 80px rgba(0,0,0,.5); }
  .modal h2 { font-family:var(--mono); font-size:11px; font-weight:700; letter-spacing:3px; text-transform:uppercase; color:var(--accent); margin-bottom:16px; }
  .modal-field { margin-bottom:12px; }
  .modal-field label { display:block; font-family:var(--mono); font-size:8px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-dim); margin-bottom:5px; }
  .modal-field input, .modal-field textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:9px 12px; color:var(--text); font-family:var(--sans); font-size:12px; }
  .modal-field input:focus, .modal-field textarea:focus { outline:none; border-color:var(--accent-dim); }
  .modal-field textarea { min-height:50px; resize:vertical; }
  .modal-actions { display:flex; gap:8px; margin-top:16px; }
  .modal-btn { flex:1; padding:9px; border-radius:var(--radius-sm); font-family:var(--mono); font-size:9px; font-weight:700; letter-spacing:1px; text-transform:uppercase; cursor:pointer; transition:all .15s; border:1px solid var(--border); background:transparent; color:var(--text-dim); }
  .modal-btn:hover { border-color:var(--text-muted); color:var(--text); }
  .modal-btn.primary { background:var(--accent); border-color:var(--accent); color:white; }
  .modal-btn.primary:hover { box-shadow:0 0 16px var(--accent-glow); }

  @media (max-width:768px) {
    .sidebar{display:none} .topbar{padding:8px 14px}
    .messages{padding:14px 16px} .input-area{padding:10px 14px 14px}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">VANCE</div>
    <div class="status-pill">
      <div class="status-dot offline" id="statusDot"></div>
      <span class="status-label" id="statusText">Connecting</span>
    </div>
  </div>
  <div class="topbar-right">
    <button class="nav-btn active" id="navChat">Chat</button>
    <a class="nav-btn" href="/costs">Costs</a>
    <a class="nav-btn" href="/brain">Brain</a>
  </div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Projects</div>
      <div id="projectList"></div>
      <button class="new-project-btn" onclick="showModal()">+ New Project</button>
    </div>
    <div class="sidebar-section" style="flex:1;overflow-y:auto">
      <div class="sidebar-label">Milestones</div>
      <div class="milestone-list" id="milestoneList">
        <span style="font-size:9px;color:var(--text-muted)">Select a project</span>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="stat-chip"><span id="memCount">0</span> memories</div>
      <div class="stat-chip"><span id="skillCount">0</span> skills</div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="orb-wrap"><div class="orb"></div><div class="orb-ring"></div></div>
        <div class="welcome-logo">VANCE</div>
        <div class="welcome-sub">Your personal AI assistant. Talk naturally — I'll build, manage, and ship your projects.</div>
        <div class="welcome-hint">Type or hold the mic to speak</div>
        <div class="key-warning" id="keyWarning" style="display:none">
          No OpenAI API key set.<br>Run: <code>export OPENAI_API_KEY=sk-...</code> then restart.
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-row">
        <button class="circle-btn" id="voiceBtn" onmousedown="startVoice()" onmouseup="stopVoice()" ontouchstart.prevent="startVoice()" ontouchend.prevent="stopVoice()">
          <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
        </button>
        <textarea class="input-field" id="inputField" placeholder="Talk to Vance..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="circle-btn send-btn" id="sendBtn" onclick="send()">
          <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal" onclick="if(event.target===this)hideModal()">
  <div class="modal">
    <h2>New Project</h2>
    <div class="modal-field"><label>Name</label><input id="projName" placeholder="My App" /></div>
    <div class="modal-field"><label>Description</label><textarea id="projDesc" placeholder="What should it do?"></textarea></div>
    <div class="modal-field"><label>Directory (optional)</label><input id="projDir" placeholder="~/Claude Test/my-app" /></div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="hideModal()">Cancel</button>
      <button class="modal-btn primary" onclick="createProject()">Create</button>
    </div>
  </div>
</div>

<script>
let ws, activeProject=null, projects=[], isBusy=false, recognition=null, isRecording=false;

// ─── Streaming state ───
let streamingMsg = null;  // current assistant .msg div being streamed into
let streamBubble = null;  // the .bubble element inside it
let streamRaw = '';       // raw text accumulated during stream
let streamTools = [];     // tool badges for current message

// ─── WebSocket ───
function connect() {
  ws = new WebSocket(`${location.protocol==='https:'?'wss:':'ws:'}//${location.host}/ws`);
  ws.onopen = () => {
    setStatus('online','Online');
    wsSend({action:'list-projects'});
    wsSend({action:'get-memories'});
    wsSend({action:'get-skills'});
  };
  ws.onclose = () => { setStatus('offline','Offline'); setTimeout(connect,3000); };
  ws.onerror = () => setStatus('offline','Error');
  ws.onmessage = e => handle(JSON.parse(e.data));
}
function wsSend(d) { if(ws?.readyState===1) ws.send(JSON.stringify(d)); }
function setStatus(s,t) {
  const d=document.getElementById('statusDot');
  d.className='status-dot '+s;
  document.getElementById('statusText').textContent=t;
}

// ─── Message Handler ───
function handle(d) {
  switch(d.type) {
    case 'connected':
      if(!d.hasKey) { setStatus('nokey','No API Key'); document.getElementById('keyWarning').style.display='block'; }
      break;

    case 'projects': projects=d.projects; renderProjects(); break;
    case 'project-created': projects.push({...d.project,milestones:[]}); renderProjects(); selectProject(d.project.id); hideModal(); break;

    case 'thinking':
      setStatus('busy','Thinking');
      isBusy=true;
      showThinking();
      break;

    case 'stream-token':
      removeThinking();
      appendStreamToken(d.content);
      break;

    case 'stream-end':
      finalizeStream();
      setStatus('online','Online');
      isBusy=false;
      break;

    case 'response':
      // Legacy non-streaming response fallback
      removeThinking();
      finalizeStream();
      if(d.content) addMsg('assistant',d.content);
      setStatus('online','Online');
      isBusy=false;
      break;

    case 'status': updateThinking(d.text); break;

    case 'claude-stream': appendStreamToken(d.content); break;
    case 'claude-tool':
    case 'function-call':
      removeThinking();
      appendToolBadge(d.name);
      break;

    case 'tool-done':
      // Tool execution done, next streaming round coming
      break;

    case 'milestone':
      appendMilestone(d.title);
      refreshMilestones();
      speak('Milestone: '+d.title);
      break;

    case 'error':
      setStatus('online','Online');
      isBusy=false;
      removeThinking();
      finalizeStream();
      addMsg('assistant','Error: '+d.message);
      break;

    case 'conversation': renderConv(d.messages); break;
    case 'milestones': renderMilestones(d.milestones); break;
    case 'memories': document.getElementById('memCount').textContent=d.stats?.total||0; break;
    case 'skills': document.getElementById('skillCount').textContent=d.skills?.length||0; break;
  }
}

// ─── Projects ───
function renderProjects() {
  const el=document.getElementById('projectList'); el.innerHTML='';
  const gc=document.createElement('div');
  gc.className='project-card'+(activeProject===null?' active':'');
  gc.onclick=()=>selectProject(null);
  gc.innerHTML='<h4>General</h4><p>No project context</p>';
  el.appendChild(gc);
  for(const p of projects) {
    const c=document.createElement('div');
    c.className='project-card'+(p.id===activeProject?' active':'');
    c.onclick=()=>selectProject(p.id);
    const mc=p.milestones?.length||0;
    c.innerHTML=`<h4>${esc(p.name)}</h4><p>${esc(p.description||p.directory||'')}</p>${mc?`<div class="project-progress"><div class="fill" style="width:${Math.min(mc*12,100)}%"></div></div>`:''}`;
    el.appendChild(c);
  }
}
function selectProject(id) {
  activeProject=id; renderProjects();
  wsSend({action:'get-conversation',convId:id||'general'});
  if(id) wsSend({action:'get-milestones',projectId:id});
  else document.getElementById('milestoneList').innerHTML='<span style="font-size:9px;color:var(--text-muted)">Select a project</span>';
}
function renderConv(msgs) {
  const el=document.getElementById('messages'); el.innerHTML='';
  streamingMsg=null; streamBubble=null; streamRaw=''; streamTools=[];
  if(!msgs.length) {
    el.innerHTML=`<div class="welcome" id="welcome"><div class="orb-wrap"><div class="orb"></div><div class="orb-ring"></div></div><div class="welcome-logo">VANCE</div><div class="welcome-sub">${activeProject?'Ready to work on this project.':'Talk to me about anything.'}</div></div>`;
    return;
  }
  for(const m of msgs) if(m.role==='user'||m.role==='assistant') addMsgDirect(m.role,m.content,false);
  scrollBottom();
}
function renderMilestones(ms) {
  const el=document.getElementById('milestoneList');
  if(!ms?.length) { el.innerHTML='<span style="font-size:9px;color:var(--text-muted)">None yet</span>'; return; }
  el.innerHTML=ms.map(m=>`<div class="milestone-item"><div class="milestone-dot"></div><div class="milestone-text">${esc(m.title)}</div></div>`).join('');
}
function refreshMilestones() { if(activeProject) wsSend({action:'get-milestones',projectId:activeProject}); }

// ─── Messages ───
function addMsg(role,content) { addMsgDirect(role,content,true); }
function addMsgDirect(role,content,scroll=true) {
  document.getElementById('welcome')?.remove();
  const el=document.getElementById('messages'), d=document.createElement('div');
  d.className='msg '+role;
  const rendered = role==='assistant' ? renderMd(content||'') : esc(content||'');
  d.innerHTML=`<div class="bubble">${rendered}</div><div class="meta">${timeLabel()}</div>`;
  el.appendChild(d);
  if(scroll) scrollBottom();
}

// ─── Streaming ───
function appendStreamToken(text) {
  if(!streamingMsg) {
    document.getElementById('welcome')?.remove();
    const el=document.getElementById('messages');
    streamingMsg = document.createElement('div');
    streamingMsg.className='msg assistant';
    streamBubble = document.createElement('div');
    streamBubble.className='bubble';
    streamBubble.innerHTML='<span class="stream-cursor"></span>';
    streamingMsg.appendChild(streamBubble);
    el.appendChild(streamingMsg);
    streamRaw='';
    streamTools=[];
  }
  streamRaw += text;
  // Re-render markdown as we go (every token for smooth feel)
  const cursor = '<span class="stream-cursor"></span>';
  streamBubble.innerHTML = renderMd(streamRaw) + cursor;
  // Re-add tool badges if any
  if(streamTools.length) {
    let toolsDiv = streamBubble.querySelector('.msg-tools');
    if(!toolsDiv) { toolsDiv=document.createElement('div'); toolsDiv.className='msg-tools'; streamBubble.appendChild(toolsDiv); }
    toolsDiv.innerHTML = streamTools.map(n=>`<span class="fn-badge done"><span class="fn-icon">&#9670;</span> ${esc(n)}</span>`).join('');
  }
  scrollBottom();
}

function appendToolBadge(name) {
  streamTools.push(name);
  if(!streamingMsg) {
    // Create message container if not streaming yet
    document.getElementById('welcome')?.remove();
    const el=document.getElementById('messages');
    streamingMsg = document.createElement('div');
    streamingMsg.className='msg assistant';
    streamBubble = document.createElement('div');
    streamBubble.className='bubble';
    streamingMsg.appendChild(streamBubble);
    el.appendChild(streamingMsg);
    streamRaw='';
  }
  let toolsDiv = streamBubble.querySelector('.msg-tools');
  if(!toolsDiv) { toolsDiv=document.createElement('div'); toolsDiv.className='msg-tools'; streamBubble.appendChild(toolsDiv); }
  toolsDiv.innerHTML = streamTools.map(n=>`<span class="fn-badge"><span class="fn-icon">&#9670;</span> ${esc(n)}</span>`).join('');
  scrollBottom();
}

function finalizeStream() {
  if(streamingMsg) {
    // Remove cursor
    const cursor = streamBubble.querySelector('.stream-cursor');
    if(cursor) cursor.remove();
    // Final render
    if(streamRaw) {
      streamBubble.innerHTML = renderMd(streamRaw);
      // Re-add tool badges
      if(streamTools.length) {
        const toolsDiv=document.createElement('div'); toolsDiv.className='msg-tools';
        toolsDiv.innerHTML = streamTools.map(n=>`<span class="fn-badge done"><span class="fn-icon">&#9670;</span> ${esc(n)}</span>`).join('');
        streamBubble.appendChild(toolsDiv);
      }
    }
    // Add meta
    const meta=document.createElement('div'); meta.className='meta'; meta.textContent=timeLabel();
    streamingMsg.appendChild(meta);
    // Speak summary
    speak(summarize(streamRaw));
  }
  streamingMsg=null; streamBubble=null; streamRaw=''; streamTools=[];
}

// ─── Thinking ───
function showThinking() {
  removeThinking();
  const el=document.getElementById('messages'), d=document.createElement('div');
  d.className='thinking-bar'; d.id='thinkInd';
  d.innerHTML='<div class="thinking-dots"><span></span><span></span><span></span></div><span class="thinking-text" id="thinkLabel">Thinking</span>';
  el.appendChild(d); scrollBottom();
}
function updateThinking(t) { const l=document.getElementById('thinkLabel'); if(l) l.textContent=t; }
function removeThinking() { document.getElementById('thinkInd')?.remove(); }

function appendMilestone(title) {
  const el=document.getElementById('messages'), d=document.createElement('div');
  d.className='milestone-bubble';
  d.innerHTML=`<span class="m-icon">&#9670;</span><span class="m-text">${esc(title)}</span>`;
  el.appendChild(d); scrollBottom();
}

// ─── Markdown Renderer ───
function renderMd(text) {
  if(!text) return '';
  let t = text;

  // Escape HTML
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Code blocks (``` ... ```)
  t = t.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code}</code></pre>`);

  // Inline code
  t = t.replace(/`([^`\n]+)`/g,'<code>$1</code>');

  // Headers
  t = t.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  t = t.replace(/^## (.+)$/gm,'<h2>$1</h2>');
  t = t.replace(/^# (.+)$/gm,'<h1>$1</h1>');

  // Bold & italic
  t = t.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
  t = t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  t = t.replace(/\*(.+?)\*/g,'<em>$1</em>');

  // Blockquotes
  t = t.replace(/^&gt; (.+)$/gm,'<blockquote>$1</blockquote>');

  // Horizontal rules
  t = t.replace(/^---$/gm,'<hr>');

  // Unordered lists (simple)
  t = t.replace(/^- (.+)$/gm,'<li>$1</li>');
  t = t.replace(/(<li>.*<\/li>\n?)+/g,'<ul>$&</ul>');

  // Ordered lists
  t = t.replace(/^\d+\. (.+)$/gm,'<li>$1</li>');

  // Links
  t = t.replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank">$1</a>');

  // Paragraphs (double newlines)
  t = t.replace(/\n\n/g,'</p><p>');
  // Single newlines -> <br> (outside of pre blocks)
  t = t.replace(/\n/g,'<br>');

  // Wrap in paragraph
  if(!t.startsWith('<')) t = '<p>' + t + '</p>';

  // Clean up empty paragraphs
  t = t.replace(/<p><\/p>/g,'');
  t = t.replace(/<p>(<h[1-3]>)/g,'$1');
  t = t.replace(/(<\/h[1-3]>)<\/p>/g,'$1');
  t = t.replace(/<p>(<pre>)/g,'$1');
  t = t.replace(/(<\/pre>)<\/p>/g,'$1');
  t = t.replace(/<p>(<ul>)/g,'$1');
  t = t.replace(/(<\/ul>)<\/p>/g,'$1');
  t = t.replace(/<p>(<blockquote>)/g,'$1');
  t = t.replace(/(<\/blockquote>)<\/p>/g,'$1');
  t = t.replace(/<p>(<hr>)<\/p>/g,'$1');

  return t;
}

function esc(s) {
  if(!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function timeLabel() { return new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}); }
function scrollBottom() { const el=document.getElementById('messages'); el.scrollTop=el.scrollHeight; }

// ─── Input ───
function send() {
  const inp=document.getElementById('inputField'), text=inp.value.trim();
  if(!text||isBusy) return;
  finalizeStream(); // clean up any pending stream
  addMsg('user',text);
  wsSend({action:'chat',message:text,projectId:activeProject});
  inp.value=''; inp.style.height='auto';
}
function handleKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function autoResize(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,140)+'px'; }

// ─── Voice ───
function startVoice() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR) return;
  recognition=new SR(); recognition.continuous=false; recognition.interimResults=true; recognition.lang='en-US';
  let final='';
  const inp=document.getElementById('inputField');
  recognition.onresult=e=>{let interim='';for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)final+=e.results[i][0].transcript;else interim+=e.results[i][0].transcript;}inp.value=final+interim;};
  recognition.onend=()=>{isRecording=false;document.getElementById('voiceBtn').classList.remove('recording');if(final.trim()){inp.value=final.trim();setTimeout(send,300);}};
  recognition.start(); isRecording=true; document.getElementById('voiceBtn').classList.add('recording');
}
function stopVoice() { if(recognition&&isRecording) recognition.stop(); }

// ─── Speech ───
function speak(text) {
  if(!text||!window.speechSynthesis) return;
  const clean=text.replace(/```[\s\S]*?```/g,'code block').replace(/`[^`]+`/g,'').replace(/<[^>]+>/g,'').substring(0,300);
  if(!clean.trim()) return;
  const u=new SpeechSynthesisUtterance(clean); u.rate=1.05; u.pitch=.95;
  const voices=speechSynthesis.getVoices();
  const pref=voices.find(v=>v.name.includes('Daniel')||v.name.includes('Alex')||v.name.includes('Samantha'));
  if(pref) u.voice=pref;
  speechSynthesis.speak(u);
}
function summarize(t) { if(!t) return ''; const s=t.split(/[.!?\n]/)[0]; return s.length>200?s.substring(0,200):s; }
speechSynthesis?.addEventListener?.('voiceschanged',()=>speechSynthesis.getVoices());

// ─── Modal ───
function showModal() { document.getElementById('modal').classList.add('visible'); document.getElementById('projName').focus(); }
function hideModal() { document.getElementById('modal').classList.remove('visible'); }
function createProject() {
  const n=document.getElementById('projName').value.trim(); if(!n) return;
  wsSend({action:'create-project',name:n,description:document.getElementById('projDesc').value.trim(),directory:document.getElementById('projDir').value.trim()||undefined});
  document.getElementById('projName').value=''; document.getElementById('projDesc').value=''; document.getElementById('projDir').value='';
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')hideModal()});

connect();
</script>
